name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "simulation_output.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 注意：这里彻底删除了 cache 相关的配置
          
      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install -g pnpm@latest --force
          pnpm install --no-frozen-lockfile           

      - name: Build
        working-directory: frontend
        run: pnpm run build

      - name: Copy latest simulation data to build
        run: |
          # 退回仓库根目录去复制数据文件
          if [ -f "../simulation_output.json" ]; then
            cp ../simulation_output.json dist/
          else
            # 如果根目录没有，试着创建一个空的，防止网页崩溃
            echo '{"history": [], "models": {}}' > dist/simulation_output.json
            echo "No simulation_output.json found, created an empty one."
          fi          
        working-directory: frontend    

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
