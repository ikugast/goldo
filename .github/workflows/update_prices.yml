name: Update Market Prices

on:
  schedule:
    # 每天北京时间 10:00, 11:00, 13:00, 14:00, 15:00 运行 (UTC时间 2,3,5,6,7)
    - cron: '0 2,3,5,6,7 * * 1-5'
  workflow_dispatch: # 允许手动触发

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt          

      - name: Update prices
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: python update_prices.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add engine_state.json simulation_output.json
          git commit -m "Auto-update market prices [skip ci]" || echo "No changes to commit"
          git push
