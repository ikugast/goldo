name: AI Stock Trading Logic

on:
  schedule:
    # GitHub 这里的定时任务必须依然保持 UTC 时间配置（不支持换时区），所以不用改
    # 9:30 CST = 1:30 UTC, 13:00 CST = 5:00 UTC, 14:30 CST = 6:30 UTC
    - cron: '30 1,5,6 * * 1-5'
  workflow_dispatch: # 允许手动触发测试

jobs:
  run-trading:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 【核心修复点】强行把这台服务器的时区调成北京时间！
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 【修复警告】升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 【修复警告】升级到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt          

      - name: Run Trading Cycle
        env:
          ARK_API_KEY_SEED: ${{ secrets.ARK_API_KEY_SEED }}
          ARK_ENDPOINT_SEED: ${{ secrets.ARK_ENDPOINT_SEED }}
          ARK_API_KEY_DEEPSEEK: ${{ secrets.ARK_API_KEY_DEEPSEEK }}
          ARK_ENDPOINT_DEEPSEEK: ${{ secrets.ARK_ENDPOINT_DEEPSEEK }}
        run: |
          python run_trading.py          

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add engine_state.json simulation_output.json
          # 现在的 $(date) 也会打印出北京时间了
          git commit -m "Auto: Update simulation results at $(date)" || echo "No changes to commit"
          git push
