name: AI Stock Trading Logic

on:
  schedule:
    # 9:30 CST = 1:30 UTC, 13:00 CST = 5:00 UTC, 14:30 CST = 6:30 UTC
    - cron: '30 1,5,6 * * 1-5'
  workflow_dispatch: # Allows manual run for testing

jobs:
  run-trading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run Trading Cycle
        env:
          ARK_API_KEY_SEED: ${{ secrets.ARK_API_KEY_SEED }}
          ARK_ENDPOINT_SEED: ${{ secrets.ARK_ENDPOINT_SEED }}
          ARK_API_KEY_DEEPSEEK: ${{ secrets.ARK_API_KEY_DEEPSEEK }}
          ARK_ENDPOINT_DEEPSEEK: ${{ secrets.ARK_ENDPOINT_DEEPSEEK }}
        run: |
          python run_trading.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add engine_state.json simulation_output.json || true
          git diff-index --quiet HEAD || git commit -m "Auto: Update simulation results at $(date)"
          git push
